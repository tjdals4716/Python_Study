<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올림픽 굿즈 스토어</title>
    <link rel="stylesheet" href="OlymPick 메인페이지.css">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="main-nav">
                <ul>
                    <li><a href="#">홈</a></li>
                    <li><a href="#">상의</a></li>
                    <li><a href="#">하의</a></li>
                    <li><a href="#">신발</a></li>
                    <li><a href="#">액세서리</a></li>
                </ul>
            </div>
            <div class="user-section">
                <div class="user-profile">
                    <img src="profile.png" alt="프로필 사진">
                    <div class="profile-details">
                        <span class="username">사용자 이름</span>
                        <button onclick="logout()">로그아웃</button>
                    </div>
                </div>
                <button class="cart-button" onclick="goToCart()">장바구니</button>
            </div>
        </header>
        <section class="auction-section">
            <h2>경매 참여</h2>
            <div class="auction-item">
                <h3>올림픽 티셔츠</h3>
                <p>현재 입찰가: ₩20,000</p>
                <input type="number" id="bid-amount" placeholder="입찰 금액 입력">
                <button onclick="placeBid()">입찰하기</button>
            </div>
        </section>
        <section class="goods-list-section">
            <h2>굿즈 목록</h2>
            <div class="goods-list">
                <div class="goods-item">
                    <h3>굿즈 이름 1</h3>
                    <p>가격: ₩10,000</p>
                    <button>구매하기</button>
                </div>
                <div class="goods-item">
                    <h3>굿즈 이름 2</h3>
                    <p>가격: ₩15,000</p>
                    <button>구매하기</button>
                </div>
                <!-- 더 많은 굿즈를 여기에 추가하세요 -->
            </div>
        </section>
    </div>
    <script src="OlymPickScript.js"></script>
</body>
</html>
